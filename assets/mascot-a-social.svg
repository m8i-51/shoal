    font-family="'Inter', 'Helvetica Neue', -apple-system, BlinkMacSystemFont, Arial, sans-serif"
    font-size="28" font-weight="400"
    fill="#7dd3fc">Agents explore it and file GitHub Issues.</text>

  <!-- Divider line -->
  <line x1="558" y1="200" x2="558" y2="440" stroke="#1e3a5f" stroke-width="1.5"/>
