<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Sticker variant: S-shaped school with white puff outline via SVG filter -->
  <defs>
    <filter id="sticker-outline" x="-15%" y="-15%" width="130%" height="130%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="4" result="expanded"/>
      <feFlood flood-color="white" result="white"/>
      <feComposite in="white" in2="expanded" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fish group shifted +10 in both axes for padding inside the 120x120 box -->
  <g filter="url(#sticker-outline)" fill="#0ea5e9">
    <!-- F1: leader, has eye -->
    <g transform="translate(60,21) rotate(5)">
      <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z"/>
      <circle cx="3" cy="-1.5" r="1.8" fill="white"/>
    </g>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(73,23) rotate(12) scale(0.9)"/>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(81,31) rotate(18) scale(0.9)"/>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(83,42) rotate(15) scale(0.88)"/>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(76,51) rotate(10) scale(0.85)"/>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(64,56) rotate(8) scale(0.83)"/>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(54,61) rotate(12) scale(0.80)"/>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(42,70) rotate(15) scale(0.78)"/>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(38,82) rotate(12) scale(0.75)"/>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(44,92) rotate(10) scale(0.73)"/>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(56,99) rotate(8) scale(0.70)"/>
    <path d="M9,0 C5,-3.5 -4,-3.5 -7,0 L-12,-5.5 L-9.5,0 L-12,5.5 L-7,0 C-4,3.5 5,3.5 9,0Z" transform="translate(69,97) rotate(5) scale(0.68)" opacity="0.75"/>
  </g>
